<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f8fafc; }
    #blockly-div { position: absolute; inset: 0; }
    .blocklyBlockCanvas,
    .blocklyBubbleCanvas { pointer-events: none !important; }
  </style>
  <script src="https://unpkg.com/blockly@12.5.1/blockly.min.js"
          integrity="sha384-SxxR8fpocVLJMl6kYyBm33uuy9U1yy0gMrMavfyCd3lQRer3qaBMlcVb0VSAfzop"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@blockly/field-colour@6.0.12/dist/index.js"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="blockly-div"></div>

  <!-- viewer.html と同じブロック定義 -->
  <script src="/js/block_palette.js?v=20260429a"></script>
  <script src="/js/blocks/gpio.js"></script>
  <script src="/js/blocks/control.js"></script>
  <script src="/js/blocks/polyviabot.js?v=20260427c"></script>
  <script src="/js/blocks/sensors.js?v=20260427c"></script>
  <script src="/js/blocks/values.js?v=20260427b"></script>
  <script src="/js/blocks/variables.js"></script>
  <script src="/js/blocks/display.js"></script>
  <script src="/js/generators/micropython.js"></script>
  <script src="/js/blocks/python_intro.js"></script>
  <script src="/js/blocks/data_analysis.js"></script>
  <script src="/js/blocks/custom_python.js?v=20260429b"></script>
  <script src="/js/blocks/game.js?v=20260429a"></script>
  <script src="/js/blocks/image_blocks.js?v=20260503b"></script>
  <script src="/js/blocks/ml.js?v=20260503b"></script>

  <script>
    (function () {
      var srcUrl = new URLSearchParams(location.search).get('src');
      if (!srcUrl) { window.__pyco_error = true; return; }

      var viewerTheme = Blockly.Theme.defineTheme('pycoShot', {
        base: Blockly.Themes.Classic,
        componentStyles: {
          workspaceBackgroundColour: '#f8fafc',
          scrollbarColour:           '#cbd5e1',
          scrollbarOpacity:          0.6,
        }
      });

      var workspace = Blockly.inject('blockly-div', {
        readOnly:   false,   // Zelos は readOnly:false でないと Field 高さが正しく測れない
        renderer:   'zelos',
        theme:      viewerTheme,
        scrollbars: false,
        zoom:       { controls: false, wheel: false, startScale: 1.0, maxScale: 3, minScale: 0.3 },
        move:       { scrollbars: false, drag: false, wheel: false },
        trashcan:   false,
        toolbox:    null,
      });

      window.__pyco_workspace = workspace;

      // blockshot.html は tools/ にあるので相対パスはルート基準で解決する
      var fetchUrl = srcUrl.startsWith('/') ? srcUrl : '/' + srcUrl;
      fetch(fetchUrl)
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function (xmlText) {
          // py_module_call_val/stmt と import系ブロックが使うモジュール名・関数名を XML から事前収集
          // → FieldDropdown がオプションリストを持てるようにする（blockshot環境用）
          var xmlDoc = new DOMParser().parseFromString(xmlText, 'text/xml');
          var modSet = {}, funcMap = {};
          xmlDoc.querySelectorAll('block[type="py_module_call_val"],block[type="py_module_call_stmt"]').forEach(function(b) {
            var mf = b.querySelector(':scope > field[name="MODULE"]');
            var ff = b.querySelector(':scope > field[name="FUNC"]');
            var mod = mf ? mf.textContent.trim() : '';
            var func = ff ? ff.textContent.trim() : '';
            if (mod) { modSet[mod] = true; if (!funcMap[mod]) funcMap[mod] = {}; }
            if (mod && func) funcMap[mod][func] = true;
          });
          // import系ブロック（py_import_module / py_import_as / py_from_import）からも収集
          xmlDoc.querySelectorAll('block[type="py_import_module"],block[type="py_import_as"],block[type="py_from_import"]').forEach(function(b) {
            var mf = b.querySelector(':scope > field[name="MODULE"]');
            var nf = b.querySelector(':scope > field[name="NAMES"]');
            var mod = mf ? mf.textContent.trim() : '';
            var names = nf ? nf.textContent.trim() : '';
            if (mod) { modSet[mod] = true; if (!funcMap[mod]) funcMap[mod] = {}; }
            if (mod && names) {
              names.split(/\s*,\s*/).forEach(function(n) { if (n) funcMap[mod][n] = true; });
            }
          });
          var modNames = Object.keys(modSet);
          if (modNames.length > 0) {
            window.getPyModuleOptions = function() {
              return modNames.map(function(n) { return [n, n]; });
            };
            window.getPyModuleFunctions = function(mod) {
              var fns = Object.keys(funcMap[mod] || {});
              return fns.length > 0 ? fns.map(function(f) { return [f, f]; }) : [['（なし）', '__none__']];
            };
          }
          workspace.resize();
          workspace.clear();
          Blockly.Xml.domToWorkspace(
            Blockly.utils.xml.textToDom(xmlText), workspace
          );
          workspace.zoomToFit();
          // rAF を2段重ねて SVG 確定を待つ
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              // ブロックが実際に占める範囲を Python 側に渡す（余白クロップ用）
              var canvas = document.querySelector('.blocklyBlockCanvas');
              if (canvas) {
                // 上・左の余白が不足する場合はキャンバスをずらして余白を確保する
                var r0 = canvas.getBoundingClientRect();
                var minTop = 70;
                var minLeft = 40;
                var shiftY = r0.top < minTop ? (minTop - r0.top) : 0;
                var shiftX = r0.left < minLeft ? (minLeft - r0.left) : 0;
                if (shiftY > 0 || shiftX > 0) {
                  var tf = canvas.getAttribute('transform') || 'translate(0,0)';
                  canvas.setAttribute('transform',
                    tf.replace(/translate\(\s*([\d.eE+-]+)\s*,\s*([\d.eE+-]+)\s*\)/,
                      function(_, x, y) { return 'translate(' + (parseFloat(x) + shiftX) + ',' + (parseFloat(y) + shiftY) + ')'; }
                    )
                  );
                }
                var r = canvas.getBoundingClientRect();
                var pad = 40;
                window.__pyco_bounds = {
                  x: Math.max(0, r.left - pad),
                  y: Math.max(0, r.top  - pad),
                  width:  r.width  + pad * 2,
                  height: r.height + pad * 2,
                };
              }
              window.__pyco_ready = true;
            });
          });
        })
        .catch(function () {
          window.__pyco_error = true;
        });
    })();
  </script>
</body>
</html>
